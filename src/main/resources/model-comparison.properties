# Complete line example:
#   CreatePatientRequest=CreatePatientResponse:uuid=uuid;display=display;@person=person:gender=gender,birthDate=birthDate;@person.address=person.address:city=city,street=street;patientField=patientField
# SUMMARY OF SPECIAL CHARACTERS:
#   :   - separates class name from rules (first colon in line)
#   :   - separates nested path from nested field list (inside @ rule)
#   ;   - separates rules from each other
#   ,   - separates fields inside a nested object rule
#   =   - separates request field name from response field name
#   @   - marks a rule as nested object mapping
#   .   - used in nested path to traverse object graph (parent.child)
CreatePatientResponse=CreatePatientResponse:uuid=uuid;display=display;@person=person:gender=gender

CreatePersonResponse=CreatePersonResponse:uuid=uuid;display=display;gender=gender;age=age